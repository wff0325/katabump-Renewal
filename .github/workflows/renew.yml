name: Katabump Auto Renew

on:
  schedule:
    # 每 3 天运行一次，在 UTC 时间的 08:50
    # 算式：50分 8点 每隔3天 任意月 任意周
    - cron: '50 8 */3 * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库 (获取 package.json)
      uses: actions/checkout@v4

    - name: 📥 2. 下载私库 (获取 katabump_renew.js)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private # 替换为你的私库名
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 移动脚本到根目录
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
     
        # 如果私库还有其他依赖文件，请在这里一并 mv 过来
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome
      
    - name: Run Renew Script
      env:
        # 将 USERS_JSON 配置在 GitHub Repository Secrets 中
        # 格式: [{"username": "xxx", "password": "xxx"}, ...]
        USERS_JSON: ${{ secrets.rawJson }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # 使用 xvfb-run 模拟有头环境运行
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
