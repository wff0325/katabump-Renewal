name: Katabump Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '00 02 04 05 *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: 📥 2. 下载私库 (获取脚本)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
    
    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 已有 lock 文件，直接开启缓存

    - name: 📦 5. 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        # 使用 npm ci 严格按照现有的 lock 文件安装，速度最快
        npm ci
        npx playwright install --with-deps chrome
      
    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        touch renew.log
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并更新 Cron & KeepAlive
      if: always()
      run: |
        # 1. 配置 Git
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 2. 提取日期
        RAW_VAL=$(grep -E "\[NEXT_TIME\]|下次可用:" renew.log | awk -F'(: |] )' '{print $2}' | tail -1 | xargs || echo "")
        
        if [ -n "$RAW_VAL" ] && [ "$RAW_VAL" != "Unknown Date" ]; then
          echo "✅ 提取日期成功: $RAW_VAL"
          
          CURRENT_YEAR=$(date +%Y)
          DATE_STR="02:00 $RAW_VAL $CURRENT_YEAR"
          NEW_CRON=$(date -d "$DATE_STR" -u +"%M %H %d %m *" 2>/dev/null | tr -d '\n\r' || echo "")
          
          if [ -n "$NEW_CRON" ]; then
            echo "🚀 新 Cron: $NEW_CRON"
            FILENAME=".github/workflows/renew.yml" # 直接指定你的文件名，更安全

            if [ -f "$FILENAME" ]; then
              # ⭐ 关键修复：使用 0,/cron:/ 确保只替换文件中的【第一个】匹配项
              # 这样它只会改顶部的 schedule，而不会改到下面这行 sed 代码本身！
              sed -i "0,/cron:/s@cron: '.*'@cron: '$NEW_CRON'@" "$FILENAME"
              echo "✅ 已成功更新 $FILENAME 的定时任务"
              git add "$FILENAME"
            fi
          fi
        else
          echo "⚠️ 未找到有效日期，保持原样。"
        fi

        # 3. 更新 time.txt (KeepAlive)
        echo "Last run: $(date)" > time.txt
        git add time.txt

        # 4. 提交推送
        if git diff --staged --quiet; then
          echo "无变化，跳过推送。"
        else
          git commit -m "🔄 自动续期: 下次预约 $RAW_VAL"
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
