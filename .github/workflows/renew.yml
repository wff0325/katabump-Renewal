name: Katabump Auto Renew

on:
  schedule:
    # 每天运行一次，在 UTC 时间的 08:50
    - cron: '50 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    # 1. 必须赋予写入权限，否则无法提交 time.txt
    permissions:
      contents: write
    
    steps:
    - name: 📥 1. 下载公开库 (获取 package.json)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 拉取完整历史，防止 push 失败

    - name: 📥 2. 下载私库 (获取 katabump_renew.js)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 移动脚本到根目录
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome
      
    - name: Run Renew Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/

    # =========================================================
    # ⏱️ 新增：提交 time.txt 到仓库 (防 60 天任务被禁用)
    # =========================================================
    - name: ⏱️ Commit time.txt to repo
      if: always() # 确保即便续期脚本失败，也更新时间文件
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 配置用户信息
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 更新时间文件
        CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')
        echo "最后续期运行时间：$CURRENT_TIME" > time.txt

        # 检查是否有变化并提交
        git add time.txt
        
        if git diff --cached --quiet; then
          echo "没有内容变化，跳过提交。"
        else
          git commit -m "⏱️ KeepAlive: $CURRENT_TIME"
          
          # 关键：先拉取远程更新，防止冲突 (针对你之前遇到的 rejected 问题)
          git pull --rebase origin ${{ github.ref_name }}
          
          # 推送到当前分支
          git push origin HEAD:${{ github.ref_name }}
        fi
