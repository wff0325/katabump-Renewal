name: Katabump Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '00 02 04 05 *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: 📥 2. 下载私库 (获取脚本)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
    
    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 已有 lock 文件，直接开启缓存

    - name: 📦 5. 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        # 使用 npm ci 严格按照现有的 lock 文件安装，速度最快
        npm ci
        npx playwright install --with-deps chrome
      
    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        touch renew.log
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并更新 Cron & KeepAlive
      if: always()
      run: |
        # 配置 Git 用户
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 1. 提取下一次运行日期
        RAW_VAL=$(grep -E "\[NEXT_TIME\]|下次可用:" renew.log | awk -F'(: |] )' '{print $2}' | tail -1 | xargs || echo "")
        
        if [ -n "$RAW_VAL" ] && [ "$RAW_VAL" != "Unknown Date" ]; then
          echo "✅ 提取到原始日期: $RAW_VAL"
          
          CURRENT_YEAR=$(date +%Y)
          DATE_STR="02:00 $RAW_VAL $CURRENT_YEAR"
          
          # 生成新 Cron
          NEW_CRON=$(date -d "$DATE_STR" -u +"%M %H %d %m *" 2>/dev/null | tr -d '\n\r' || echo "")
          
          if [ -n "$NEW_CRON" ]; then
            echo "🚀 成功生成 UTC Cron: $NEW_CRON"
            FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
            
            if [ -n "$FILENAME" ]; then
              # 关键修复点：匹配引号内任意内容并替换
              sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"
              git add "$FILENAME"
            fi
          fi
        else
          echo "⚠️ 未提取到有效日期，跳过 Cron 更新。"
        fi

        # 2. 更新 time.txt (防止 GitHub 自动禁用任务)
        CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')
        echo "最后运行时间：$CURRENT_TIME" > time.txt
        git add time.txt

        # 3. 提交并推送
        if git diff --staged --quiet; then
          echo "内容无变化，跳过推送。"
        else
          git commit -m "🔄 更新预约与 KeepAlive: ${RAW_VAL:-$CURRENT_TIME}"
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
