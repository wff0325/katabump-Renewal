name: Katabump Auto Renew

on:
  schedule:
    # 初始运行时间
    - cron: '00 12 * * *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: 📥 2. 下载私库
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本与依赖环境
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
        echo '{
          "name": "katabump-renew",
          "version": "1.0.0",
          "dependencies": {
            "playwright": "1.41.0",
            "playwright-extra": "^4.3.6",
            "puppeteer-extra-plugin-stealth": "^2.11.2",
            "axios": "^1.6.0"
          }
        }' > package.json

    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 5. 安装依赖并强制生成 Lock 文件
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install --with-deps chrome
      
    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        touch renew.log
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并提交所有新文件
      if: always()
      run: |
        echo "--- 日志内容检查 ---"
        if [ -f renew.log ]; then tail -n 25 renew.log; else echo "renew.log 不存在"; fi
        echo "------------------"

        # 配置 Git
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 1. 提取时间逻辑 (RAW_VAL 可能是 "04 May")
        RAW_VAL=$(grep -E "\[NEXT_TIME\]|下次可用:" renew.log | awk -F'(: |] )' '{print $2}' | tail -1 | xargs || echo "")
        
        if [ -n "$RAW_VAL" ] && [ "$RAW_VAL" != "Unknown Date" ] && [ "$RAW_VAL" != "" ]; then
          echo "✅ 提取到原始日期: $RAW_VAL"
          
          # ❗ 修正：重新排列日期字符串顺序，并加上当前年份。
          # 格式改为: "02:00 04 May 2026" (这是 Linux date 命令最喜欢的格式)
          CURRENT_YEAR=$(date +%Y)
          DATE_STR="02:00 $RAW_VAL $CURRENT_YEAR"
          
          # 尝试转换。如果失败，NEW_CRON 为空
          NEW_CRON=$(date -d "$DATE_STR" -u +"%M %H %d %m *" 2>/dev/null || echo "")
          
          if [ -n "$NEW_CRON" ]; then
            echo "🚀 成功生成 UTC Cron: $NEW_CRON"
            FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
            if [ -n "$FILENAME" ]; then
              sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"
              git add "$FILENAME"
            fi
          else
            echo "❌ 日期转换仍然失败: '$DATE_STR'"
          fi
        fi

        # 2. 更新 time.txt
        CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')
        echo "最后运行时间：$CURRENT_TIME" > time.txt
        
        # 3. 智能添加文件
        git add time.txt
        [ -f package.json ] && git add package.json
        [ -f package-lock.json ] && git add package-lock.json

        # 4. 提交并强制推送
        if git diff --staged --quiet; then
          echo "没有内容变化，跳过推送。"
        else
          git commit -m "🔄 更新计划、环境与KeepAlive: ${RAW_VAL:-$CURRENT_TIME}"
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
