name: Katabump Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '00 02 04 05 *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: 📥 2. 下载私库 (获取脚本)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
    
    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 已有 lock 文件，直接开启缓存

    - name: 📦 5. 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        # 使用 npm ci 严格按照现有的 lock 文件安装，速度最快
        npm ci
        npx playwright install --with-deps chrome
      
    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        touch renew.log
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并更新 Cron & KeepAlive
      if: always()
      run: |
        # 1. 配置 Git
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 2. 灵活提取日期
        RAW_VAL=""
        
        # 尝试 A: 寻找脚本明确输出的下次可用时间 (还没到时间的情况)
        # 匹配 [NEXT_TIME] 之后的所有内容
        RAW_VAL=$(grep "\[NEXT_TIME\]" renew.log | tail -1 | sed 's/.*\[NEXT_TIME\] //' | xargs || echo "")

        # 尝试 B: 如果 A 没找到，检查是否续期成功
        if [ -z "$RAW_VAL" ] || [ "$RAW_VAL" = "Unknown Date" ]; then
          if grep -q "Renew successful" renew.log; then
            echo "✅ 脚本运行成功，自动预约 24 小时后重新检查。"
            # 生成明天的这个时间
            RAW_VAL=$(date -d "+1 day" "+%b %d, %Y")
          fi
        fi

        echo "🔍 最终提取的日期字符串: '$RAW_VAL'"

        if [ -n "$RAW_VAL" ] && [ "$RAW_VAL" != "Unknown Date" ]; then
          CURRENT_YEAR=$(date +%Y)
          # 强制指定在 UTC 02:05 运行，增加 5 分钟缓冲
          # date -d 能够识别 "May 05, 2024" 这种格式
          NEW_CRON=$(date -d "$RAW_VAL 02:05" -u +"%M %H %d %m *" 2>/dev/null || echo "")
          
          if [ -n "$NEW_CRON" ]; then
            echo "🚀 目标新 Cron: $NEW_CRON"
            FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)

            if [ -n "$FILENAME" ]; then
              # 使用 @ 作为定界符，防止变量中带斜杠导致 sed 出错
              sed -i "0,/cron:/s@cron:.*@cron: '$NEW_CRON'@" "$FILENAME"
              echo "🔍 验证修改结果："
              grep "cron:" "$FILENAME" | head -n 1
              git add "$FILENAME"
            fi
          else
            echo "❌ 日期转换失败，RAW_VAL 格式无法解析。"
          fi
        else
          echo "⚠️ 未找到有效日期（可能脚本报错或登录失败），跳过 Cron 更新。"
        fi

        # 3. 更新 time.txt (KeepAlive)
        echo "最后运行时间: $(date)" > time.txt
        git add time.txt

        # 4. 提交推送
        if git diff --staged --quiet; then
          echo "没有内容变化，跳过推送。"
        else
          git commit -m "🔄 自动续期: 下次预约 $RAW_VAL"
          # 使用 force 确保即便 Actions 运行频率高也能推上去
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
