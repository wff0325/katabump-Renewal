name: Host2Play 自动续期

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '0 0,11,22 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  run-renew:
    name: 执行续订
    runs-on: ubuntu-latest

    steps:
      - name: 📥 1. 拉取当前仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 📥 2. 拉取私有仓库脚本
        uses: actions/checkout@v4
        with:
          repository: wff0325/Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private_temp

      - name: 📂 3. 准备脚本文件
        run: |
          # 将私库里的脚本移动到当前目录
          mv private_temp/Host2Play.py ./main.py

      - name: 🟢 4. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 5. 安装系统依赖与 Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 📦 6. 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: 🌐 7. 启用 WARP 网络 (解决 IP 限制)
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 🔧 8. 修复 DNS 并检查网络
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org || echo "无法获取 IP"

      - name: 🚀 9. 执行续订脚本
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb 虚拟显示运行，并将输出保存到 renew.log 以便后续提取时间
          touch renew.log
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python main.py 2>&1 | tee renew.log

      - name: 🔄 10. 提取时间并自动更新 Cron
        if: always()
        run: |
          # 1. 配置 Git 身份
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. 从日志中提取 [NEXT_TIME] 后的日期 (例如 "08 May")
          RAW_VAL=$(grep "\[NEXT_TIME\]" renew.log | tail -1 | sed 's/.*\[NEXT_TIME\] //' | xargs || echo "")

          # 如果提取失败但脚本显示成功，设定一个保底时间（比如 24 小时后）
          if [ -z "$RAW_VAL" ] || [ "$RAW_VAL" = "Unknown Date" ]; then
            if grep -q "Renew successful" renew.log || grep -q "成功" renew.log; then
              RAW_VAL=$(date -d "+1 day" "+%d %b")
            fi
          fi

          echo "🔍 提取到的日期: '$RAW_VAL'"

          NEW_CRON=""
          if [ -n "$RAW_VAL" ]; then
            # 格式化日期为可解析格式
            SAFE_DATE=$(echo "$RAW_VAL" | sed 's/ /-/g')
            T_D=$(date -d "$SAFE_DATE" +"%d" 2>/dev/null || echo "")
            T_M=$(date -d "$SAFE_DATE" +"%m" 2>/dev/null || echo "")

            if [ -n "$T_D" ] && [ -n "$T_M" ]; then
              # 设定在目标日期的 UTC 02:05 运行
              NEW_CRON="05 02 $T_D $T_M *"
              echo "🚀 新 Cron 表达式: $NEW_CRON"
            fi
          fi

          # 3. 写入文件
          if [ -n "$NEW_CRON" ]; then
            FILENAME=".github/workflows/$(basename ${{ github.event.workflow_run.path || 'host2play.yml' }})"
            # 兼容性查找当前 workflow 文件
            WORKFLOW_FILE=$(grep -l "name: Host2Play 自动续期" .github/workflows/*.yml | head -n 1)
            if [ -n "$WORKFLOW_FILE" ]; then
              sed -i "0,/cron:/s@cron:.*@cron: '$NEW_CRON'@" "$WORKFLOW_FILE"
              git add "$WORKFLOW_FILE"
            fi
          fi

          # 4. 更新 KeepAlive 避免仓库停滞
          echo "Last run: $(date)" > last_run.txt
          git add last_run.txt

          # 5. 提交并推送
          if git diff --staged --quiet; then
            echo "没有变化，跳过推送。"
          else
            git commit -m "🔄 自动更新下次续期时间: $RAW_VAL"
            git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
          fi

      - name: 📸 11. 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 🧹 12. 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
