name: Katabump Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '05 02 08 05 *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 1. 下载公开库
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: 📥 2. 下载私库 (获取脚本)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private 
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本
      run: |
        mv private_temp/katabump_renew.js ./katabump_renew.js
    
    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 已有 lock 文件，直接开启缓存

    - name: 📦 5. 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        # 使用 npm ci 严格按照现有的 lock 文件安装，速度最快
        npm ci
        npx playwright install --with-deps chrome
      
    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        touch renew.log
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node katabump_renew.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并更新 Cron & KeepAlive
      if: always()
      run: |
        # 1. 配置 Git
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 2. 灵活提取日期
        RAW_VAL=$(grep "\[NEXT_TIME\]" renew.log | tail -1 | sed 's/.*\[NEXT_TIME\] //' | xargs || echo "")

        # 尝试 B: 如果 A 没找到，检查是否续期成功
        if [ -z "$RAW_VAL" ] || [ "$RAW_VAL" = "Unknown Date" ]; then
          if grep -q "Renew successful" renew.log; then
            echo "✅ 续期成功，预约 24 小时后重新检查。"
            RAW_VAL=$(date -d "+1 day" "+%d %b")
          fi
        fi

        echo "🔍 提取到的日期字符串: '$RAW_VAL'"

        NEW_CRON=""
        if [ -n "$RAW_VAL" ] && [ "$RAW_VAL" != "Unknown Date" ]; then
          # --- 核心修复：更健壮的日期解析 ---
          # 将 "08 May" 转换为 "08-May"，这在 Linux 下是极稳健的格式
          SAFE_DATE=$(echo "$RAW_VAL" | sed 's/ /-/g')
          
          # 分别提取月(%m)和日(%d)
          T_D=$(date -d "$SAFE_DATE" +"%d" 2>/dev/null || echo "")
          T_M=$(date -d "$SAFE_DATE" +"%m" 2>/dev/null || echo "")

          if [ -n "$T_D" ] && [ -n "$T_M" ]; then
            # 设定在目标日期的 UTC 02:05 运行 (即北京时间 10:05)
            NEW_CRON="05 02 $T_D $T_M *"
            echo "🚀 生成的新 Cron: $NEW_CRON"
          fi
        fi

        # 3. 更新文件
        if [ -n "$NEW_CRON" ]; then
          FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
          if [ -n "$FILENAME" ]; then
            # 替换 cron 所在的行
            sed -i "0,/cron:/s@cron:.*@cron: '$NEW_CRON'@" "$FILENAME"
            echo "✅ 已更新 $FILENAME 中的 Cron 配置"
            git add "$FILENAME"
          fi
        else
          echo "⚠️ 转换失败或未找到日期，跳过 Cron 更新。"
        fi

        # 4. 更新 time.txt (KeepAlive) 并提交
        echo "最后运行时间: $(date)" > time.txt
        git add time.txt

        if git diff --staged --quiet; then
          echo "没有内容变化，跳过推送。"
        else
          git commit -m "🔄 自动续期: 下次预约 $RAW_VAL"
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
